name: "publish-ubuntu-x86"

on:
  push:
    branches:
      - release

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          #- platform: "macos-latest" # for Arm based macs (M1 and above).
          #  args: "--target aarch64-apple-darwin"
          #- platform: "macos-latest" # for Intel based macs.
          #  args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          #- platform: "windows-latest"
          #  args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          # Install only minimum required packages without recommended dependencies
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Configure library paths
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Create pkg-config wrapper for controlled library paths
          sudo tee /usr/local/bin/pkg-config-wrapper << 'EOF' > /dev/null
          #!/bin/sh
          export PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig
          export PKG_CONFIG_LIBDIR=/usr/lib/x86_64-linux-gnu/pkgconfig
          export PKG_CONFIG_SYSROOT_DIR=/
          export PKG_CONFIG_ALLOW_SYSTEM_CFLAGS=1
          export PKG_CONFIG_ALLOW_SYSTEM_LIBS=1
          exec pkg-config "$@"
          EOF
          sudo chmod +x /usr/local/bin/pkg-config-wrapper
          
          # Set environment variables for build
          echo "PKG_CONFIG=/usr/local/bin/pkg-config-wrapper" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Install analysis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Set environment variables for optimization
        run: |
          # Optimization flags for maximum size reduction
          echo "RUSTFLAGS=-C opt-level=z -C codegen-units=1 -C lto=true -C embed-bitcode=yes -C strip=symbols" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_LTO=true" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_PANIC=abort" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_OPT_LEVEL=z" >> $GITHUB_ENV
          # Control dynamic linking
          echo "CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=false" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_INCREMENTAL=false" >> $GITHUB_ENV
          # WebKit optimization
          echo "WEBKIT_DISABLE_COMPOSITING_MODE=1" >> $GITHUB_ENV
          echo "WEBKIT_FORCE_MINIMAL_FEATURES=1" >> $GITHUB_ENV

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_LINKER: "rust-lld"
        with:
          tagName: app-v0.1.0
          releaseName: "App v0.1.0"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: "--target x86_64-unknown-linux-gnu"
          distPath: ./build
          bundleIdentifier: com.supabasecommunity.supabassomatic
          appName: "supa-bass-o-matic"
          appVersion: "0.1.0"
          artifactPaths: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb*
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.rpm*
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage*

      - name: List build directory
        if: success()
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          if [ -d "$TARGET_DIR" ]; then
            echo "Listing target directory contents:"
            ls -R "$TARGET_DIR"
            echo "File sizes:"
            find "$TARGET_DIR" -type f -exec ls -lh {} \;
            echo "Binary analysis:"
            if [ -f "$TARGET_DIR/appimage"/*.AppImage ]; then
              echo "Analyzing AppImage..."
              size "$TARGET_DIR/appimage"/*.AppImage
              readelf -s "$TARGET_DIR/appimage"/*.AppImage || true
              echo "Extracting AppImage to analyze contents..."
              cd /tmp
              cp "$TARGET_DIR/appimage"/*.AppImage ./
              chmod +x ./*.AppImage
              ./*.AppImage --appimage-extract || true
              echo "Directory sizes:"
              du -sh squashfs-root/* 2>/dev/null || true
              echo "Largest files:"
              find squashfs-root -type f -exec ls -lh {} \; | sort -rh | head -n 10 || true
            fi
          else
            echo "Bundle directory does not exist at $TARGET_DIR"
            echo "Contents of src-tauri/target:"
            ls -R src-tauri/target || true
          fi
