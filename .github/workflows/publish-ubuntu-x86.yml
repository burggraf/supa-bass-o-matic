name: "publish-ubuntu-x86"

on:
  push:
    branches:
      - release

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          #- platform: "macos-latest" # for Arm based macs (M1 and above).
          #  args: "--target aarch64-apple-darwin"
          #- platform: "macos-latest" # for Intel based macs.
          #  args: "--target x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # for Tauri v1 you could replace this with ubuntu-20.04.
            args: ""
          #- platform: "windows-latest"
          #  args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm install

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli
          npm install -g @tauri-apps/cli

      - name: Build web assets
        run: npm run build

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Those targets are only used on macos runners so it's in an `if` to slightly speed up windows and linux builds.
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            binutils

      - name: Configure build environment
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Set environment variables to prefer system libraries
          echo "PKG_CONFIG_PATH=/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          
          # WebKit optimization
          echo "WEBKIT_DISABLE_COMPOSITING_MODE=1" >> $GITHUB_ENV
          echo "WEBKIT_FORCE_MINIMAL_FEATURES=1" >> $GITHUB_ENV
          echo "WEBKIT_DISABLE_MEDIA_SOURCE=1" >> $GITHUB_ENV
          echo "WEBKIT_DISABLE_MEDIA_STREAM=1" >> $GITHUB_ENV
          echo "WEBKIT_DISABLE_WEB_AUDIO=1" >> $GITHUB_ENV
          
          # Rust specific optimizations
          echo "RUSTFLAGS=-C opt-level=z -C codegen-units=1 -C lto=true -C embed-bitcode=yes -C strip=symbols -C target-cpu=x86-64" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_LTO=true" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_CODEGEN_UNITS=1" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_OPT_LEVEL=z" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_BUILD_OVERRIDE_DEBUG=false" >> $GITHUB_ENV
          echo "CARGO_PROFILE_RELEASE_INCREMENTAL=false" >> $GITHUB_ENV
          
          # GTK optimization
          echo "GTK_MODULES=" >> $GITHUB_ENV
          echo "GTK_A11Y=none" >> $GITHUB_ENV
          echo "GTK_CSD=0" >> $GITHUB_ENV
          echo "GTK_THEME=Adwaita:light" >> $GITHUB_ENV

      - name: Configure dynamic linking
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          echo "RUSTFLAGS=$RUSTFLAGS -C link-args=-Wl,--as-needed,--gc-sections" >> $GITHUB_ENV
          
          # Create linker configuration
          sudo tee /etc/ld.so.conf.d/tauri.conf << EOF
          /usr/lib/x86_64-linux-gnu
          EOF
          sudo ldconfig
          
          # Configure rpath to prefer system libraries
          echo "RUSTFLAGS=$RUSTFLAGS -C link-args=-Wl,-rpath,/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          
          # Create AppImage exclude list
          cat > exclude.list << EOF
          usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0
          usr/lib/x86_64-linux-gnu/gtk-3.0/3.0.0/immodules
          usr/lib/x86_64-linux-gnu/gtk-3.0/3.0.0/printbackends
          usr/share/doc
          usr/share/locale
          usr/share/X11
          EOF

      - name: Build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: "v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: "--target x86_64-unknown-linux-gnu"

      # Post-build optimization for AppImage
      - name: Optimize AppImage
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          # Strip debug symbols from libraries
          if [ -d "src-tauri/target/release/bundle/appimage/supa-bass-o-matic.AppDir" ]; then
            find src-tauri/target/release/bundle/appimage/supa-bass-o-matic.AppDir -type f -name "*.so*" -exec strip --strip-all {} \;
            
            # Remove unnecessary files based on exclude list
            while read -r pattern; do
              rm -rf "src-tauri/target/release/bundle/appimage/supa-bass-o-matic.AppDir/$pattern"
            done < exclude.list
          fi

      - name: Upload Release Artifacts
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: release-artifacts
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.rpm
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage

      - name: List build directory
        if: success()
        shell: bash
        run: |
          TARGET_DIR="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
          if [ -d "$TARGET_DIR" ]; then
            echo "Listing target directory contents:"
            ls -R "$TARGET_DIR"
            echo "File sizes:"
            find "$TARGET_DIR" -type f -exec ls -lh {} \;
            echo "Binary analysis:"
            if [ -f "$TARGET_DIR/appimage"/*.AppImage ]; then
              echo "Analyzing AppImage..."
              size "$TARGET_DIR/appimage"/*.AppImage
              readelf -s "$TARGET_DIR/appimage"/*.AppImage || true
              echo "Extracting AppImage to analyze contents..."
              cd /tmp
              cp "$TARGET_DIR/appimage"/*.AppImage ./
              chmod +x ./*.AppImage
              ./*.AppImage --appimage-extract || true
              echo "Directory sizes:"
              du -sh squashfs-root/* 2>/dev/null || true
              echo "Largest files:"
              find squashfs-root -type f -exec ls -lh {} \; | sort -rh | head -n 10 || true
            fi
          else
            echo "Bundle directory does not exist at $TARGET_DIR"
            echo "Contents of src-tauri/target:"
            ls -R src-tauri/target || true
          fi
